# incoming requests headers defaults
match request header set "X-Forwarded-For" value "$REMOTE_ADDR"
match request header set "X-Forwarded-Host" value "$HOST"
match request header set "X-Forwarded-Port" value "$SERVER_PORT"
match request header set "X-Forwarded-By" value "$SERVER_ADDR:$SERVER_PORT"
match request header set "Keep-Alive" value "$TIMEOUT"
match request header set "Connection" value "Close"

# outgoing headers defaults
match response header remove "Server"
match response header set "Content-Security-Policy" value "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; base-uri 'self'; frame-ancestors"
match response header set "X-Frame-Options" value "deny"
match response header set "X-XSS-Protection" value "1; mode=block"
match response header set "X-Content-Type-Options" value "nosniff"
match response header set "Referrer-Policy" value "no-referrer"